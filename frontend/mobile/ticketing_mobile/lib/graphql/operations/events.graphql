# Get events by category (cursor pagination)
query GetEventsByCategory($categoryId: String!, $first: Int, $after: String) {
  eventsByCategoryCursorPagination(
    categoryId: $categoryId
    pagination: { first: $first, after: $after }
  ) {
    edges {
      node {
        ...EventCardFields
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}

# Search events (cursor pagination)
query SearchEvents($query: String!, $first: Int, $after: String) {
  searchEventsCursorPagination(
    query: $query
    pagination: { first: $first, after: $after }
  ) {
    edges {
      node {
        ...EventCardFields
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}

# Discover events with filters (cursor pagination)
query DiscoverEvents(
  $searchQuery: String
  $categoryId: String
  $categoryIds: [String!]
  $cityName: String
  $startDate: DateTime
  $endDate: DateTime
  $minPrice: BigDecimal
  $maxPrice: BigDecimal
  $isFreeEvent: Boolean
  $hasAvailableTickets: Boolean
  $isFeatured: Boolean
  $first: Int
  $after: String
) {
  discoverEvents(
    filter: {
      searchQuery: $searchQuery
      categoryId: $categoryId
      categoryIds: $categoryIds
      cityName: $cityName
      startDate: $startDate
      endDate: $endDate
      minPrice: $minPrice
      maxPrice: $maxPrice
      isFreeEvent: $isFreeEvent
      hasAvailableTickets: $hasAvailableTickets
      isFeatured: $isFeatured
    }
    pagination: { first: $first, after: $after }
  ) {
    edges {
      node {
        ...EventCardFields
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}

# Get free events (cursor pagination)
query GetFreeEvents($first: Int, $after: String) {
  freeEventsCursorPagination(pagination: { first: $first, after: $after }) {
    edges {
      node {
        ...EventCardFields
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}
