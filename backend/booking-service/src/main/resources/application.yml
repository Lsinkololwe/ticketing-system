server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: booking-service
  main:
    allow-bean-definition-overriding: true
  lifecycle:
    timeout-per-shutdown-phase: 60s

  modulith:
    events:
      jdbc:
        enabled: true
        schema: dev_ticketing_modulith
        schema-initialization:
          enabled: true
      externalization:
        enabled: false
      republish-outstanding-events-on-restart: true
      completion-mode: delete
    async-termination:
      enabled: true
      timeout: 30s

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/shared_db?currentSchema=dev_ticketing_modulith}
    username: ${POSTGRES_USER:app_user}
    password: ${POSTGRES_PASSWORD:app_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ModulithEventsPool
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  cloud:
    azure:
      keyvault:
        secret:
          enabled: ${AZURE_KEYVAULT_ENABLED:false}
          endpoint: ${AZURE_KEYVAULT_ENDPOINT:}
          property-source-enabled: true
          refresh-interval: ${AZURE_KEYVAULT_REFRESH_INTERVAL:3600000}
      credential:
        managed-identity-enabled: ${AZURE_MANAGED_IDENTITY_ENABLED:false}
        client-id: ${AZURE_CLIENT_ID:}
        client-secret: ${AZURE_CLIENT_SECRET:}
        tenant-id: ${AZURE_TENANT_ID:}
      servicebus:
        connection-string: ${azure-servicebus-connection-string:${AZURE_SERVICEBUS_CONNECTION_STRING:}}
        namespace: ${AZURE_SERVICEBUS_NAMESPACE:}
        retry:
          mode: exponential
          max-retries: 3
          delay: 1s
          max-delay: 30s
          try-timeout: 60s
        producer:
          send-timeout: 30s
        consumer:
          prefetch-count: 10
          max-concurrent-calls: 5
          auto-complete: false
          max-auto-lock-renew-duration: 5m
    stream:
      default-binder: servicebus
      function:
        definition: catalogEventConsumer;ticketOutput
      bindings:
        catalogEventConsumer-in-0:
          destination: catalog-events
          group: booking-service
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0
            default-retryable: true
        ticketOutput-out-0:
          destination: booking-events
          producer:
            partition-key-expression: headers['partitionKey']
      servicebus:
        bindings:
          catalogEventConsumer-in-0:
            consumer:
              entity-type: topic
              checkpoint-mode: RECORD
              auto-complete: false
              prefetch-count: 10
              max-concurrent-calls: 5
              max-auto-lock-renew-duration: 5m
              sub-queue: none
              receive-mode: peek-lock
              session-enabled: false
          ticketOutput-out-0:
            producer:
              entity-type: topic

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:admin_password@localhost:27017/dev_ticketing?authSource=admin&directConnection=true}
      database: ${MONGODB_DATABASE:dev_ticketing}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  graphql:
    path: /graphql
    graphiql:
      enabled: true
      path: /graphiql
    websocket:
      path: /graphql
      connection-init-timeout: 60s

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8084/realms/myticketzm}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8084/realms/myticketzm/protocol/openid-connect/certs}
      client:
        registration:
          booking-service:
            client-id: booking-service
            client-secret: ${BOOKING_SERVICE_SECRET:booking-service-secret}
            authorization-grant-type: client_credentials
            scope: internal-read,internal-write
        provider:
          booking-service:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8084/realms/myticketzm/protocol/openid-connect/token}

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

security:
  debug:
    enabled: ${SECURITY_DEBUG_ENABLED:true}

dgs:
  graphql:
    schema-locations: classpath*:graphql/**/*.graphql*
    # Disable DGS's built-in DateTime/Date/Time scalars (OffsetDateTime-backed,
    # cannot serialize Instant). Replaced by com.pml.shared.graphql.DateTimeScalar.
    extensions:
      scalars:
        time-dates:
          enabled: false

keycloak:
  client-id: ${KEYCLOAK_CLIENT_ID:booking-service}

services:
  catalog:
    url: ${CATALOG_SERVICE_URL:http://localhost:8085}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,caches
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    group:
      liveness:
        include: livenessState,ping
      readiness:
        include: readinessState,mongo,redis
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: booking

logging:
  level:
    root: INFO
    com.pml.booking: DEBUG
    org.springframework.modulith: DEBUG
    org.springframework.modulith.events: DEBUG
    # Spring Security debugging - set to INFO to disable
    # Core security
    org.springframework.security: TRACE
    # WebFlux reactive security (WebFilterChainProxy, filters)
    org.springframework.security.web.server: TRACE
    org.springframework.security.web.server.WebFilterChainProxy: TRACE
    org.springframework.security.web.server.MatcherSecurityWebFilterChain: TRACE
    org.springframework.security.web.server.authorization: TRACE
    org.springframework.security.web.server.authentication: TRACE
    org.springframework.security.web.server.context: TRACE
    # OAuth2 Resource Server / JWT
    org.springframework.security.oauth2: TRACE
    org.springframework.security.oauth2.server.resource: TRACE
    org.springframework.security.oauth2.jwt: TRACE
    # Authentication
    org.springframework.security.authentication: TRACE
    org.springframework.security.authorization: TRACE
    # Security config
    org.springframework.security.config: TRACE
    org.springframework.security.config.web.server: TRACE
    # Reactor context propagation
    reactor.netty.http.server: DEBUG
    # Custom security debug filter
    com.pml.shared.security: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

graphql:
  security:
    enabled: true
    max-depth: ${GRAPHQL_MAX_DEPTH:10}
    max-complexity: ${GRAPHQL_MAX_COMPLEXITY:200}
    log-rejected-queries: ${GRAPHQL_LOG_REJECTED:true}
    depth-exceeded-message: "Query depth limit exceeded"
    complexity-exceeded-message: "Query complexity limit exceeded"

booking:
  service:
    version: 1.0.0
    description: Ticket Inventory and Orders Microservice
  inventory:
    reservation-timeout-minutes: 15
    optimistic-locking: true
    cache-enabled: true
    cache-ttl-seconds: 60
  payment:
    timeout-minutes: 15

pawapay:
  api:
    url: ${PAWAPAY_API_URL:https://api.sandbox.pawapay.io}
    token: ${pawapay-api-token:${PAWAPAY_API_TOKEN:}}
    version: v2
    connect-timeout: 10s
    read-timeout: 30s
  webhook:
    verify-signature: ${PAWAPAY_VERIFY_SIGNATURE:false}
    public-key-id: ${pawapay-webhook-key-id:${PAWAPAY_WEBHOOK_KEY_ID:}}
    public-key: ${pawapay-webhook-public-key:${PAWAPAY_WEBHOOK_PUBLIC_KEY:}}
    signature-max-age: 5m
    supported-digest-algorithms: [sha-256, sha-512]
    supported-signature-algorithms: [ecdsa-p256-sha256, rsa-pss-sha512]
    ip-allowlist-enabled: ${PAWAPAY_IP_ALLOWLIST_ENABLED:false}
    allowed-ips:
      - "${PAWAPAY_WEBHOOK_IP_1:}"
      - "${PAWAPAY_WEBHOOK_IP_2:}"
      - "${PAWAPAY_WEBHOOK_IP_3:}"
    allowed-cidrs:
      - "${PAWAPAY_WEBHOOK_CIDR_1:}"
      - "${PAWAPAY_WEBHOOK_CIDR_2:}"
  retry:
    max-attempts: 3
    initial-delay: 1s
    max-delay: 30s
    multiplier: 2.0
    retryable-status-codes: [408, 429, 500, 502, 503, 504]
  providers:
    mtn:
      code: MTN_MOMO_ZMB
      display-name: MTN Mobile Money
      prefixes: ["26097", "26096"]
      enabled: true
    airtel:
      code: AIRTEL_ZMB
      display-name: Airtel Money
      prefixes: ["26077", "26076"]
      enabled: true
    zamtel:
      code: ZAMTEL_ZMB
      display-name: Zamtel Kwacha
      prefixes: ["26095"]
      enabled: true

payment:
  timeout: 15m
  commission:
    rate: ${PLATFORM_COMMISSION_RATE:0.05}
    minimum: 0
    maximum: 0
  escrow:
    hold-period: 7d
    allow-partial-payout: true
    minimum-payout-amount: 10.00
  refund:
    cutoff-hours-before-event: 24
    allow-post-event-refund: false
    require-approval: true
    auto-approve-threshold: 100.00
    processing-fee-rate: 0
  gateway:
    primary-providers:
      MTN: pawapay
      AIRTEL: pawapay
      ZAMTEL: pawapay
    fallback:
      enabled: true
      max-retries: 2
      health-check-timeout-ms: 5000

platform:
  commission:
    rate: ${PLATFORM_COMMISSION_RATE:0.05}
  qrcode:
    async-generation: true
    size: 300
    error-correction: M
    storage:
      type: s3
      bucket: ${S3_BUCKET_NAME:myticketzm-qrcodes}
      region: ${AWS_REGION:us-east-1}
  refund:
    cutoff-hours-before-event: 24
    refund-policies:
      - days-before: 30
        percentage: 100
      - days-before: 14
        percentage: 80
      - days-before: 7
        percentage: 50
      - days-before: 1
        percentage: 0
  features:
    inventory-caching: true
    async-qr-generation: true
    payment-retry: true
    fraud-detection: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - org.springframework.web.reactive.function.client.WebClientResponseException
        ignoreExceptions:
          - com.pml.booking.exception.BusinessValidationException
    instances:
      catalogService:
        baseConfig: default
        failureRateThreshold: 60
        waitDurationInOpenState: 20s
      pawaPayService:
        baseConfig: default
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 5
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 5s
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignoreExceptions:
          - com.pml.booking.exception.BusinessValidationException
    instances:
      catalogService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 1s
      pawaPayService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 2s
        exponentialBackoffMultiplier: 2.5
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true
    instances:
      catalogService:
        baseConfig: default
        timeoutDuration: 15s
      pawaPayService:
        baseConfig: default
        timeoutDuration: 30s

integrations:
  catalog-service:
    base-url: ${CATALOG_SERVICE_URL:http://catalog-service:8085}
    timeout-seconds: 5
  identity-service:
    base-url: ${IDENTITY_SERVICE_URL:http://identity-service:8083}
    timeout-seconds: 5

notification:
  enabled: true
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
    from: ${NOTIFICATION_EMAIL_FROM:noreply@pml-events.com}
    admin-recipients: ${NOTIFICATION_ADMIN_EMAILS:finance@pml-events.com}
  slack:
    enabled: ${NOTIFICATION_SLACK_ENABLED:false}
    webhook-url: ${SLACK_WEBHOOK_URL:}
    channel: ${SLACK_CHANNEL:#finance-alerts}
  sms:
    enabled: ${NOTIFICATION_SMS_ENABLED:false}
    provider-url: ${SMS_PROVIDER_URL:}
    api-key: ${SMS_API_KEY:}
    on-call-numbers: ${SMS_ON_CALL_NUMBERS:}

mongodb:
  schema-validation:
    enabled: ${MONGODB_SCHEMA_VALIDATION_ENABLED:true}
    validation-action: ${MONGODB_VALIDATION_ACTION:ERROR}
    validation-level: ${MONGODB_VALIDATION_LEVEL:STRICT}
    fail-on-validation-error: ${MONGODB_VALIDATION_FAIL_ON_ERROR:true}
    schema-base-path: ${MONGODB_SCHEMA_BASE_PATH:mongodb/schemas}
    operation-timeout-ms: ${MONGODB_SCHEMA_TIMEOUT_MS:30000}
