# ============================================================================
# KUBERNETES PROFILE CONFIGURATION
# Booking Service - Production-ready K8s settings
# ============================================================================
# Activate with: SPRING_PROFILES_ACTIVE=kubernetes
# ============================================================================

# Logging - stdout only for K8s log aggregation
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.pml.booking: ${LOG_LEVEL:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","correlationId":"%X{correlationId:-}","class":"%logger{36}","message":"%msg"}%n'

# Disable file-based logging in K8s (use stdout)
# Logs are collected by K8s logging agent (Fluentd, Fluent Bit, etc.)

# Management endpoints - expose more for K8s observability
management:
  endpoint:
    health:
      show-details: when_authorized
  server:
    # Separate management port (optional, for security)
    # port: 8081

# Database connection tuning for K8s
spring:
  datasource:
    hikari:
      # Kubernetes pods may take time to warm up
      initialization-fail-timeout: 30000
      # Connection validation
      connection-test-query: SELECT 1
      validation-timeout: 5000

  # Redis - use K8s service name
  data:
    redis:
      host: ${REDIS_HOST:redis}
      connect-timeout: 5000ms

# Resilience4j tuning for K8s (longer timeouts for pod startup)
resilience4j:
  circuitbreaker:
    configs:
      default:
        waitDurationInOpenState: 30s
  timelimiter:
    configs:
      default:
        timeoutDuration: 45s
