server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: identity-service
  main:
    allow-bean-definition-overriding: true
  lifecycle:
    timeout-per-shutdown-phase: 60s

  modulith:
    events:
      jdbc:
        enabled: true
        schema: dev_ticketing_modulith
        schema-initialization:
          enabled: true
      externalization:
        enabled: false
      republish-outstanding-events-on-restart: true
      completion-mode: delete
    async-termination:
      enabled: true
      timeout: 30s

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/shared_db?currentSchema=dev_ticketing_modulith}
    username: ${POSTGRES_USER:app_user}
    password: ${POSTGRES_PASSWORD:app_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ModulithEventsPool
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  cloud:
    azure:
      servicebus:
        connection-string: ${AZURE_SERVICEBUS_CONNECTION_STRING:}
        namespace: ${AZURE_SERVICEBUS_NAMESPACE:}
        producer:
          send-timeout: 30s
    stream:
      default-binder: servicebus
      function:
        definition: ""
      bindings:
        userOutput-out-0:
          destination: identity-events
          producer:
            partition-key-expression: headers['partitionKey']
      servicebus:
        bindings:
          userOutput-out-0:
            producer:
              entity-type: topic

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:admin_password@localhost:27017/dev_ticketing?authSource=admin&directConnection=true}
      database: ${MONGODB_DATABASE:dev_ticketing}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  graphql:
    graphiql:
      enabled: true
    path: /graphql
    websocket:
      path: /graphql
      connection-init-timeout: 60s

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8084/realms/myticketzm}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8084/realms/myticketzm/protocol/openid-connect/certs}
      client:
        registration:
          identity-service:
            client-id: identity-service
            client-secret: ${IDENTITY_SERVICE_SECRET:identity-service-secret}
            authorization-grant-type: client_credentials
            scope: internal-read,internal-write
        provider:
          identity-service:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8084/realms/myticketzm/protocol/openid-connect/token}

security:
  debug:
    enabled: ${SECURITY_DEBUG_ENABLED:true}

dgs:
  graphql:
    schema-locations: classpath*:graphql/**/*.graphql*
    schema-json:
      enabled: false
    introspection:
      enabled: true

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8084}
  realm: ${KEYCLOAK_REALM:myticketzm}
  admin-username: ${KEYCLOAK_ADMIN_USER:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  admin-realm: master
  client-id: identity-service
  client-secret: ${IDENTITY_SERVICE_SECRET:identity-service-secret}

services:
  catalog:
    url: ${CATALOG_SERVICE_URL:http://localhost:8085}
  booking:
    url: ${BOOKING_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    group:
      liveness:
        include: livenessState,ping
      readiness:
        include: readinessState,mongo,redis
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: identity

logging:
  level:
    root: INFO
    com.pml.identity: DEBUG
    org.springframework.modulith: DEBUG
    org.springframework.modulith.events: DEBUG
    # Spring Security debugging - set to INFO to disable
    # Core security
    org.springframework.security: TRACE
    # WebFlux reactive security (WebFilterChainProxy, filters)
    org.springframework.security.web.server: TRACE
    org.springframework.security.web.server.WebFilterChainProxy: TRACE
    org.springframework.security.web.server.MatcherSecurityWebFilterChain: TRACE
    org.springframework.security.web.server.authorization: TRACE
    org.springframework.security.web.server.authentication: TRACE
    org.springframework.security.web.server.context: TRACE
    # OAuth2 Resource Server / JWT
    org.springframework.security.oauth2: TRACE
    org.springframework.security.oauth2.server.resource: TRACE
    org.springframework.security.oauth2.jwt: TRACE
    # Authentication
    org.springframework.security.authentication: TRACE
    org.springframework.security.authorization: TRACE
    # Security config
    org.springframework.security.config: TRACE
    org.springframework.security.config.web.server: TRACE
    # Reactor context propagation
    reactor.netty.http.server: DEBUG
    # Custom security debug filter
    com.pml.shared.security: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

graphql:
  security:
    enabled: true
    max-depth: ${GRAPHQL_MAX_DEPTH:10}
    max-complexity: ${GRAPHQL_MAX_COMPLEXITY:200}
    log-rejected-queries: ${GRAPHQL_LOG_REJECTED:true}
    depth-exceeded-message: "Query depth limit exceeded"
    complexity-exceeded-message: "Query complexity limit exceeded"

identity:
  service:
    version: 1.0.0
    description: User Management and Platform Operations Microservice
  cdc:
    webhook:
      enabled: true
      path: /api/cdc/events
      debezium-server-url: http://debezium-server-identity:8100
  features:
    email-verification: true
    sms-verification: false
    two-factor-auth: false
    file-upload: true
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
    length: ${OTP_LENGTH:6}
    max-attempts: ${OTP_MAX_ATTEMPTS:3}
    cooldown-minutes: ${OTP_COOLDOWN_MINUTES:1}
  notifications:
    email:
      enabled: true
      provider: sendgrid
    sms:
      enabled: false
      provider: twilio
    push:
      enabled: false
      provider: fcm

messaging:
  provider: ${MESSAGING_PROVIDER:whatsapp}
  whatsapp:
    api-url: https://graph.facebook.com/v17.0
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    otp-template: ${WHATSAPP_OTP_TEMPLATE:otp_verification}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
  storage:
    type: s3
    bucket: ${S3_BUCKET:myticketzm-files}
    region: ${AWS_REGION:us-east-1}

mongock:
  migration-scan-package:
    - com.pml.identity.migration
  enabled: ${MONGOCK_ENABLED:true}
  transactional: ${MONGOCK_TRANSACTIONAL:true}
  lock-acquired-for-millis: 60000
  lock-quit-trying-after-millis: 180000
  lock-try-frequency-millis: 1000

mongodb:
  schema-validation:
    enabled: ${MONGODB_SCHEMA_VALIDATION_ENABLED:true}
    validation-action: ${MONGODB_VALIDATION_ACTION:ERROR}
    validation-level: ${MONGODB_VALIDATION_LEVEL:STRICT}
    fail-on-validation-error: ${MONGODB_VALIDATION_FAIL_ON_ERROR:true}
    schema-base-path: ${MONGODB_SCHEMA_BASE_PATH:mongodb/schemas}
    operation-timeout-ms: ${MONGODB_SCHEMA_TIMEOUT_MS:30000}

resilience4j:
  circuitbreaker:
    instances:
      keycloak:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        record-exceptions:
          - jakarta.ws.rs.ProcessingException
          - jakarta.ws.rs.WebApplicationException
          - java.util.concurrent.TimeoutException
  retry:
    instances:
      keycloak:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - jakarta.ws.rs.ProcessingException
          - java.util.concurrent.TimeoutException

file-upload:
  max-file-size: 10485760
  max-filename-length: 255
  allowed-extensions: [pdf, jpg, jpeg, png, webp]
  allowed-mime-types: [application/pdf, image/jpeg, image/png, image/webp]
  presigned-url:
    default-expiry-minutes: 60
    max-expiry-minutes: 1440
  malware-scanning:
    enabled: false
    clamav-host: ${CLAMAV_HOST:localhost}
    clamav-port: ${CLAMAV_PORT:3310}
    timeout-seconds: 30

file-storage:
  type: ${FILE_STORAGE_TYPE:local}
  local:
    base-path: ${FILE_STORAGE_LOCAL_PATH:./uploads}
    serve-files: true
    cleanup-on-shutdown: false
  s3:
    enabled: ${AWS_S3_ENABLED:false}

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket:
      verification-documents: ${AWS_S3_BUCKET_VERIFICATION_DOCS:ticketing-verification-docs}
    encryption:
      enabled: true
      type: ${AWS_S3_ENCRYPTION_TYPE:AES256}
      kms-key-id: ${AWS_S3_KMS_KEY_ID:}
    lifecycle:
      transition-to-ia-days: 90
      expiration-days: 2555
  credentials:
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

app:
  security:
    encryption:
      key: ${APP_SECURITY_ENCRYPTION_KEY:LqjaTnuN4/v63gj/uxhU3HfBqITe2vx4Ep5dJZxX48Q=}
