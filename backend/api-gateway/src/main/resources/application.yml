server:
  port: 8080
  shutdown: graceful
  max-http-request-header-size: 8KB
  netty:
    max-initial-line-length: 8192

spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 60s
  http:
    codecs:
      max-in-memory-size: 10MB

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            pool:
              type: elastic
              max-connections: 1000
              acquire-timeout: 1000
              max-idle-time: 30s
            connect-timeout: 5000
            response-timeout: 30s
          trusted-proxies: "127\\.0\\.0\\.1|10\\..*|172\\.(1[6-9]|2[0-9]|3[0-1])\\..*|192\\.168\\..*"
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:3030"
                  - "http://localhost:3003"
                  - "http://localhost:5173"
                  - "${FRONTEND_URL:http://localhost:3000}"
                allowedMethods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: graphql-federation
              uri: ${APOLLO_ROUTER_URL:http://localhost:4001}
              predicates:
                - Path=/graphql
              filters:
                - RewritePath=/graphql, /
                - name: CircuitBreaker
                  args:
                    name: apolloRouterCircuitBreaker
                    fallbackUri: forward:/fallback/graphql
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                    methods: POST
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2
            - id: payment-webhooks
              uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/webhooks/payment/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 100
                    redis-rate-limiter.burstCapacity: 200
                    key-resolver: "#{@ipKeyResolver}"
            - id: keycloak-realm
              uri: ${KEYCLOAK_URL:http://localhost:8084}
              predicates:
                - Path=/realms/myticketzm/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: keycloakCircuitBreaker
                    fallbackUri: forward:/fallback/identity
            - id: keycloak-resources
              uri: ${KEYCLOAK_URL:http://localhost:8084}
              predicates:
                - Path=/resources/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: keycloakCircuitBreaker
            - id: oauth2-legacy
              uri: ${KEYCLOAK_URL:http://localhost:8084}
              predicates:
                - Path=/oauth2/**
              filters:
                - RewritePath=/oauth2/(?<segment>.*), /realms/myticketzm/protocol/openid-connect/$\{segment}
                - name: CircuitBreaker
                  args:
                    name: keycloakCircuitBreaker
                    fallbackUri: forward:/fallback/identity
            - id: wellknown-legacy
              uri: ${KEYCLOAK_URL:http://localhost:8084}
              predicates:
                - Path=/.well-known/openid-configuration
              filters:
                - RewritePath=/.well-known/openid-configuration, /realms/myticketzm/.well-known/openid-configuration
                - name: CircuitBreaker
                  args:
                    name: keycloakCircuitBreaker
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8084/realms/myticketzm}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8084/realms/myticketzm/protocol/openid-connect/certs}

keycloak:
  url: ${KEYCLOAK_URL:http://localhost:8084}
  realm: myticketzm
  client-id: ${KEYCLOAK_CLIENT_ID:api-gateway}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
    instances:
      apolloRouterCircuitBreaker:
        baseConfig: default
        failureRateThreshold: 30
        slowCallDurationThreshold: 5s
      keycloakCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
    instances:
      apolloRouterCircuitBreaker:
        timeoutDuration: 45s
      keycloakCircuitBreaker:
        timeoutDuration: 15s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    group:
      liveness:
        include: livenessState,ping
      readiness:
        include: readinessState,circuitBreakers
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.pml.gateway: DEBUG
    io.github.resilience4j: INFO

gateway:
  security:
    max-request-size: 10485760
    max-graphql-size: 1048576
    max-upload-size: 52428800
    max-uri-length: 8192
    max-header-size: 8192
    auth-rate-limit:
      enabled: true
      max-attempts: 5
      window-seconds: 300
      lockout-seconds: 900
